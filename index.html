<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>كوتشينة الأوامر - النسخة المستقرة</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg-color: #1a0f1a; --card-back: #4a0e0e; --accent: #ffd700; }
        body { background-color: var(--bg-color); margin: 0; padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; user-select: none; font-family: sans-serif; color: white; overflow-x: hidden; }
        
        #setup-screen { position: fixed; inset: 0; background: var(--bg-color); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .room-input { padding: 15px; border-radius: 10px; border: 2px solid #4a0e0e; background: #2d1b2d; color: white; font-size: 1.1rem; width: 250px; text-align: center; }
        
        .controls { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 15px; position: sticky; top: 0; z-index: 2000; background: rgba(26, 15, 26, 0.95); padding: 10px 0; border-bottom: 1px solid #333; }
        
        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-player { background: #008cff; font-size: 1.1rem; width: 250px; box-shadow: 0 4px #005fa3; }
        .btn-reset { background: #ff4444; box-shadow: 0 4px #b32d2d; }
        .mode-online { background: #008cff; box-shadow: 0 4px #005fa3; }

        .card { width: calc(25% - 8px); aspect-ratio: 2 / 3; perspective: 1000px; touch-action: manipulation; cursor: pointer; }
        @media (max-width: 480px) { .card { width: calc(33.33% - 8px); } }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; }
        .card-back { background: var(--card-back); border: 2px solid #631111; }
        .card-front { background: white; transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 1.2rem; border: 1px solid #ccc; }
        .action-card { background: linear-gradient(135deg, #6a0dad, #b026ff) !important; color: white !important; border: 2px solid var(--accent); }
        .red { color: #ff4444 !important; }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; justify-content: center; align-items: center; }
        .modal-content { width: 85%; max-width: 350px; background: white; border-radius: 25px; padding: 25px; color: #000; text-align: center; position: relative; }
        .battle-container { display: flex; gap: 15px; align-items: center; justify-content: center; margin: 20px 0; }
        .mini-card { width: 80px; height: 110px; border: 2px solid #ddd; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 22px; background: #fdfdfd; }
        
        .close-btn { position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%); background: #ff4444; color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; cursor: pointer; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .player-indicator { position: fixed; top: 12px; left: 12px; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 6px; font-size: 12px; z-index: 2500; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h2 style="color:var(--accent)">كوتشينة الأوامر</h2>
    <input type="text" id="room-id" class="room-input" placeholder="ادخل كود الغرفة">
    <button class="btn btn-player" onclick="joinRoom(1)">أنا اللاعب 1</button>
    <button class="btn btn-player" style="background: #ff00ea;" onclick="joinRoom(2)">أنا اللاعب 2</button>
</div>

<div class="player-indicator" id="p-label">بانتظار الدخول...</div>

<div class="controls">
    <div id="battle-status" style="color: var(--accent); font-weight: bold; margin-bottom: 5px;"></div>
    <div style="display: flex; gap: 10px;">
        <button id="modeBtn" class="btn mode-online" onclick="toggleMode()">تغيير المود</button>
        <button class="btn btn-reset" onclick="resetGame()">إعادة خلط الكروت</button>
    </div>
</div>

<div id="board" style="display: contents;"></div>

<div id="overlay">
    <div class="modal-content">
        <div id="modal-header" style="color: #888; font-size: 14px;"></div>
        <div id="modal-text"></div>
        <div class="close-btn" onclick="requestCloseModal()">✕</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAvUWVPzOphulv9Ejh-dWPdxQKijAkJH_w",
        authDomain: "cardsgame-cf381.firebaseapp.com",
        databaseURL: "https://cardsgame-cf381-default-rtdb.firebaseio.com",
        projectId: "cardsgame-cf381",
        storageBucket: "cardsgame-cf381.firebasestorage.app",
        messagingSenderId: "599054973878",
        appId: "1:599054973878:web:ae034ffa6fb7afaa231f17"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let gameRef = null;
    let myPlayerNum = null;
    let currentData = null;
    let isProcessing = false;

    const valuesOrder = {'A':14,'K':13,'Q':12,'J':11,'10':10,'9':9,'8':8,'7':7,'6':6,'5':5,'4':4,'3':3,'2':2};
    const onlineActions = [{t:'سوي حركة مثيرة', i:'💃'}, {t:'انزعي قطعة ملابس', i:'👙'}, {t:'المسي صدرك', i:'🍒'}, {t:'قول فكرة جنسية', i:'💭'}, {t:'ارسل مقطع جنسي', i:'🎬'}, {t:'خدي وضعية جنسية', i:'🛌'}, {t:'داعبي كسك', i:'🔥'}, {t:'البسي الذيل', i:'🦊'}, {t:'كلام سكسي', i:'👄'}, {t:'اظهر زبك / كسك', i:'🔞'}];
    const offlineActions = [{t:'مص / لحس', i:'👅'}, {t:'حضن', i:'🫂'}, {t:'مساج', i:'💆‍♂️'}, {t:'قبلات خفيفة', i:'💋'}, {t:'مص زبه', i:'🍌'}, {t:'الحس كسها', i:'🍑'}, {t:'اضرب مكوتها', i:'🖐️'}];

    function joinRoom(num) {
        const rId = document.getElementById('room-id').value.trim();
        if (!rId) return alert("ادخل كود الغرفة");
        myPlayerNum = num;
        gameRef = db.ref('rooms/' + rId);
        document.getElementById('p-label').innerText = "غرفة: " + rId + " | لاعب " + num;
        document.getElementById('setup-screen').style.display = 'none';
        
        gameRef.on('value', (snap) => {
            currentData = snap.val();
            if (!currentData) {
                if(myPlayerNum === 1) createDeck('online');
                return;
            }
            updateUI();
        });
    }

    function createDeck(mode) {
        let deck = [];
        ['♠','♣','♥','♦'].forEach(s => {
            Object.keys(valuesOrder).forEach(v => deck.push({type:'n', s, v, weight: valuesOrder[v]}));
        });
        const acts = (mode === 'online') ? onlineActions : offlineActions;
        [...acts, ...acts].forEach(a => deck.push({type:'a', t:a.t, i:a.i}));
        deck.sort(() => Math.random() - 0.5);
        gameRef.set({ deck, flippedIndices: {}, p1Card: null, p2Card: null, lastAction: null, mode });
    }

    function updateUI() {
        const board = document.getElementById('board');
        const status = document.getElementById('battle-status');
        board.innerHTML = '';

        // رندر الكروت
        currentData.deck.forEach((d, idx) => {
            const isFlipped = currentData.flippedIndices && currentData.flippedIndices[idx];
            const div = document.createElement('div');
            div.className = 'card';
            let fClass = "card-front " + (d.type === 'a' ? "action-card" : ((d.s === '♥' || d.s === '♦') ? "red" : ""));
            
            div.innerHTML = `<div class="card-inner ${isFlipped?'flipped':''}">
                <div class="card-back"></div>
                <div class="${fClass}">${d.type==='n' ? `<div>${d.v}</div><div>${d.s}</div>` : `<div>${d.i}</div><div style="font-size:10px">${d.t}</div>`}</div>
            </div>`;

            div.onclick = () => handleCardClick(d, idx, isFlipped);
            board.appendChild(div);
        });

        // تحديث النصوص والحالة
        if (currentData.lastAction) {
            showModal(currentData.lastAction);
        } else {
            document.getElementById('overlay').style.display = 'none';
            if (currentData.p1Card && !currentData.p2Card) status.innerText = "بانتظار اللاعب 2...";
            else if (!currentData.p1Card && currentData.p2Card) status.innerText = "بانتظار اللاعب 1...";
            else status.innerText = "اختر كرتك";
        }

        // منطق المقارنة التلقائي (للاعب الثاني)
        if (currentData.p1Card && currentData.p2Card && !currentData.lastAction) {
            const c1 = currentData.p1Card;
            const c2 = currentData.p2Card;
            let win = c1.weight > c2.weight ? "اللاعب 1 كسب!" : (c2.weight > c1.weight ? "اللاعب 2 كسب!" : "تعادل!");
            gameRef.update({ lastAction: { type: 'battle', c1, c2, win } });
        }
    }

    function handleCardClick(card, index, isFlipped) {
        if (isFlipped || isProcessing || currentData.lastAction) return;

        const myKey = 'p' + myPlayerNum + 'Card';
        
        if (card.type === 'a') {
            isProcessing = true;
            gameRef.update({ 
                [`flippedIndices/${index}`]: true, 
                lastAction: { type: 'action', data: card },
                p1Card: null, p2Card: null 
            }).then(() => isProcessing = false);
        } else {
            if (currentData[myKey]) return alert("اخترت كرتك بالفعل!");
            isProcessing = true;
            gameRef.update({ 
                [`flippedIndices/${index}`]: true, 
                [myKey]: card 
            }).then(() => isProcessing = false);
        }
    }

    function showModal(obj) {
        const mText = document.getElementById('modal-text');
        const mHead = document.getElementById('modal-header');
        if (obj.type === 'action') {
            mHead.innerText = "أمر عشوائي";
            mText.innerHTML = `<div style="font-size:70px">${obj.data.i}</div><div style="font-size:20px; font-weight:bold">${obj.data.t}</div>`;
        } else {
            mHead.innerText = "نتيجة المواجهة";
            const h = (c) => `<div class="mini-card" style="color:${(c.s==='♥'||c.s==='♦')?'red':'black'}"><div>${c.v}</div><div>${c.s}</div></div>`;
            mText.innerHTML = `<div class="battle-container">${h(obj.c1)} <b style="color:red">VS</b> ${h(obj.c2)}</div>
                               <div style="color:green; font-weight:bold; font-size:22px">${obj.win}</div>`;
        }
        document.getElementById('overlay').style.display = 'flex';
    }

    function requestCloseModal() {
        // أهم خطوة: تصفير الكروت لبدء جولة جديدة تماماً
        gameRef.update({ lastAction: null, p1Card: null, p2Card: null });
    }

    function toggleMode() {
        if(confirm("سيتم إعادة خلط الكروت، موافق؟")) {
            createDeck(currentData.mode === 'online' ? 'offline' : 'online');
        }
    }

    function resetGame() {
        if(confirm("هل تريد إعادة خلط الكروت؟")) createDeck(currentData.mode);
    }
</script>
</body>
</html>
